version: "3.9"

services:

  # ── векторная БД ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: hf_rag_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── кэш ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hf_rag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── приложение (FastAPI + Streamlit в одном контейнере) ───────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hf_rag_app
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"   # FastAPI  → http://localhost:8000/docs
      - "8501:8501"   # Streamlit → http://localhost:8501
    depends_on:
      - qdrant
      - redis
    volumes:
      # монтируем корпус снаружи (удобно при переиндексации)
      - ./rag_corpus_cleaned_v2:/app/rag_corpus_cleaned_v2:ro
      # используем уже скачанные модели с хоста — не качаем заново
      - ~/.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
